<h1>dragonball works!</h1>
<hr>

<section class="row">
  <div class="col-12 col-sm-6">
    <h3>Agregar: {{ name()}}</h3>
    <input type="text" class="form-control" placeholder="Nombre" [value]="name()" (change)="name.set(nameInput.value)"
      (input)="name.set(nameInput.value)" #nameInput />

    <input type="number" class="form-control mt-2" placeholder="Poder" [value]="power()"
      (input)="power.set(+powerInput.value)" #powerInput />

    <button class="mt-2 btn btn-primary" (click)="addCharacter()">Agregar</button>
  </div>
  <div class="col-12 col-sm-6">
    <h3>Listado</h3>
    <ul class="list-group">
      @for(character of characters(); track character.id; let idx = $index) {
      @if(character.power > 500) {
      <li class="list-group-item">
        <span>{{idx + 1}} - {{ character.name }}</span>
        <strong [class.text-danger]="character.power > 9000"> ({{ character.power }})</strong>
        <!-- <strong [ngClass]="powerClasses()"> ({{ character.power }})</strong> -->
      </li>
      }
      }
    </ul>
  </div>
</section>
